# GitHub Pages deployment workflow for HydroSense blog

name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      # Just-the-Docs still generates assets/js/search-data.json even with
      # search_enabled: false (its template guard is `!= nil`, not truthy).
      # Nothing references it on the live site, but it's a 28 MB orphan in
      # the artifact, so delete it before uploading.
      - name: Remove unused Lunr search index
        run: rm -f _site/assets/js/search-data.json

      # Generate static search index from the built site.
      # Replaces the Just-the-Docs Lunr.js index (~28 MB, loaded on every page)
      # with chunked Pagefind shards fetched on demand only when searching.
      - name: Generate Pagefind search index
        run: npx -y pagefind@latest --site _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
