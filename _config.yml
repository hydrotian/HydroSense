# HydroSense Blog Configuration
# Jekyll site for paper harvest reports

# Site settings
title: HydroSense
description: >-
  Automated literature tracking for hydrology and water resources research.

# GitHub Pages deployment
baseurl: ""
url: "https://hydrosense.simhydro.com"

# Theme
remote_theme: just-the-docs/just-the-docs

# Color scheme - custom with light blue links
color_scheme: hydrosense

# Enable color scheme selector (for dark mode toggle)
color_scheme_supports_dark: true

# Search: handled by Pagefind (static, lazy-loaded) instead of Just-the-Docs'
# built-in Lunr.js. With 800+ pages the Lunr index grew to ~28 MB and was
# downloaded on every page load. Pagefind generates chunked indexes inside
# _site/pagefind/ and fetches them on demand only when the user searches.
# See .github/workflows/jekyll.yml for the build step.
search_enabled: false

# Navigation
nav_enabled: true
nav_sort: case_sensitive

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Aux links (top right)
aux_links:
  "Back to SimHydro":
    - "https://simhydro.com"

# Footer
footer_content: "Powered by CrossRef, Semantic Scholar, OpenAlex, and Claude"

# Enable heading anchors
heading_anchors: true

# External navigation links
nav_external_links:
  - title: SimHydro Main Site
    url: https://simhydro.com
    hide_icon: false

# Collections for organizing content by year/month
# Using pages collection to enable hierarchical navigation
collections:
  pages:
    output: true
    permalink: /:path/

# Syntax highlighting
syntax_highlighter_style: colorful

# Plugins
plugins:
  - jekyll-feed
  - jekyll-readme-index
  - jemoji
  - jekyll-toc
  - jekyll-seo-tag

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Exclude from processing
exclude:
  - data/
  - scripts/
  - requirements.txt
  - .env
  - .env.example
  - README.md
  - CONTRIBUTING.md
  - CLAUDE.md
  - BLOG_README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - LICENSE
  - papers/

# Include
include:
  - _pages

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
