<style>
.aux-nav .aux-nav-list {
  display: flex !important;
  align-items: center !important;
  gap: 8px;
}
.aux-nav-list-item {
  display: flex;
  align-items: center;
}
.lang-toggle {
  display: inline-flex;
  align-items: center;
  padding: 3px 12px;
  border: 1px solid #5b9bd5;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  color: #5b9bd5;
  text-decoration: none !important;
  transition: all 0.15s ease;
  line-height: 1.4;
  white-space: nowrap;
}
.lang-toggle:hover {
  background-color: #5b9bd5;
  color: #fff;
  text-decoration: none !important;
}
@media (prefers-color-scheme: dark) {
  .lang-toggle {
    border-color: #64b5f6;
    color: #64b5f6;
  }
  .lang-toggle:hover {
    background-color: #64b5f6;
    color: #1c1c1e;
  }
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var path = window.location.pathname;
  var isZh = path.indexOf('/zh/') === 0;
  var href, label;

  if (isZh) {
    // Chinese page -> link to English
    href = path.replace(/^\/zh\//, '/');
    label = 'English';
  } else {
    // English page -> link to Chinese
    href = '/zh' + (path === '/' ? '/' : path);
    label = '\u4E2D\u6587';
  }

  var toggle = document.createElement('a');
  toggle.className = 'lang-toggle';
  toggle.href = href;
  toggle.textContent = label;

  var auxNav = document.querySelector('.aux-nav .aux-nav-list');
  if (auxNav) {
    var li = document.createElement('li');
    li.className = 'aux-nav-list-item';
    li.appendChild(toggle);
    auxNav.insertBefore(li, auxNav.firstChild);
  }
});
</script>
